name: Validate Skills Package

on:
  pull_request:
    paths:
      - "skills/**"
      - ".claude-plugin/marketplace.json"
      - "README.md"
      - "hooks/**"
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - ".claude-plugin/marketplace.json"
      - "README.md"
      - "hooks/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Discover skills from repository
        run: npx --yes skills@1.4.9 add . --list
